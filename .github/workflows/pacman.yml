name: Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Pacman
        uses: buluma/github-action-readme-generator@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate contribution graph
        uses: Iguineli/pacman-contribution-graph@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: techyshubham18
          branch: pacman-output
